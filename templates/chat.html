<!-- Favicon / Icône de l'onglet -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/387/387569.png" type="image/png">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/387/387569.png" type="image/png">

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    
    <!-- Votre CSS personnalisé -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .animate-slideIn { animation: slideIn 0.3s ease-out; }
        .animate-bounce { animation: bounce 1.4s infinite; }
        
        /* Scrollbar personnalisée avec les nouvelles couleurs */
        #messageFormeight::-webkit-scrollbar { width: 6px; }
        #messageFormeight::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        #messageFormeight::-webkit-scrollbar-thumb { background: #00CDB7; border-radius: 10px; }
        #messageFormeight::-webkit-scrollbar-thumb:hover { background: #0F2D4A; }
    </style>
</head>

<body class="bg-gray-100">
    <div class="container mx-auto h-screen flex items-center justify-center">
        <div class="w-full max-w-2xl">
            <!-- Header de la page -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">Assistant Médical </h1>
                <p class="text-gray-500 mt-2">Posez vos questions et obtenez des réponses instantanées.</p>
            </div>
            
            <!-- Carte de chat -->
            <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-200">
                <!-- Header du chat avec la couleur #00CDB7 -->
                <div class="p-4 flex items-center space-x-3" style="background-color: #00CDB7;">
                    <div class="relative">
                        <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" 
                             alt="Bot" 
                             class="w-12 h-12 rounded-full border-2 border-white object-cover">
                        <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-400 rounded-full border-2 border-white animate-pulse"></span>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-semibold text-white text-lg">Votre assistant médical</h3>
                        <p class="text-xs text-white opacity-90 flex items-center">
                            En ligne
                        </p>
                    </div>
                </div>

                <!-- Zone des messages -->
                <div id="messageFormeight" class="h-96 overflow-y-auto p-4 space-y-4 bg-gray-50">
                    <!-- Les messages seront insérés ici par jQuery -->
                </div>

                <!-- Footer avec input -->
                <div class="p-4 border-t bg-white">
                    <form id="messageArea" class="flex items-center space-x-2">
                        <input type="text" 
                               id="text" 
                               name="msg" 
                               placeholder="Écrivez votre message..." 
                               autocomplete="off" 
                               class="flex-1 p-3 border rounded-xl focus:outline-none focus:ring-2 transition-all"
                               style="border-color: #00CDB7;"
                               required>
                        <button type="submit" 
                                id="send" 
                                class="p-3 text-white rounded-xl transition-all hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2"
                                style="background-color: #00CDB7;">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                    <p class="text-xs text-gray-400 mt-2 text-center">
                        Assistant médical intelligent
                    </p>
                </div>
            </div>
        </div>
    </div>
    <style>
        
     /* Styles pour les suggestions */
.suggestion-card {
    transition: all 0.3s ease;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
}

.suggestion-card:hover {
    transform: translateX(3px);
}

/* Animation d'entrée pour les suggestions */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.suggestion-card {
    animation: fadeInUp 0.5s ease-out forwards;
    animation-delay: calc(var(--index) * 0.1s);
    opacity: 0;
}
    </style>

                    blue: { bg: 'bg-blue-100', text: 'text-blue-500', hover: 'hover:bg-blue-500' },

                    red: { bg: 'bg-red-100', text: 'text-red-500', hover: 'hover:bg-red-500' },

            }

            setTimeout(() => {

            function getCurrentTime() {
                const date = new Date();
                const hours = date.getHours().toString().padStart(2, '0');
                const minutes = date.getMinutes().toString().padStart(2, '0');
                return hours + ":" + minutes;
            }

            $("#messageArea").on("submit", function(event) {
                event.preventDefault();
                
                const currentTime = getCurrentTime();
                const rawText = $("#text").val().trim();
                
                if (!rawText) return;

                // Message utilisateur avec la couleur #00CDB7
                const userHtml = '<div class="flex justify-end mb-4 animate-slideIn">' +
                    '<div class="flex items-end space-x-2 flex-row-reverse">' +
                    '<div class="flex-shrink-0">' +
                    '<img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="w-8 h-8 rounded-full object-cover">' +
                    '</div>' +
                    '<div class="relative p-3 text-white rounded-2xl rounded-br-none max-w-[80%]" style="background-color: #00CDB7;">' +
                    '<p class="text-sm">' + rawText + '</p>' +
                    '<div class="flex items-center justify-end space-x-1 mt-1 text-white/70">' +
                    '<i class="fas fa-clock text-xs"></i>' +
                    '<span class="text-xs">' + currentTime + '</span>' +
                    '</div>' +
                    '<div class="absolute bottom-0 right-0 translate-x-1/2 w-3 h-3" style="background-color: #00CDB7; clip-path: polygon(0 0, 100% 0, 0 100%);"></div>' +
                    '</div>' +
                    '</div>' +
                    '</div>';

                $("#messageFormeight").append(userHtml);
                $("#text").val("");
                
                // Scroll vers le bas
                $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);

                // Appel AJAX à votre API
                $.ajax({
                    type: "POST",
                    url: "/get",
                    data: { msg: rawText },
                    success: function(data) {
                        const botHtml = '<div class="flex justify-start mb-4 animate-slideIn">' +
                            '<div class="flex items-end space-x-2">' +
                            '<div class="flex-shrink-0">' +
                            '<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="w-8 h-8 rounded-full object-cover">' +
                            '</div>' +
                            '<div class="relative p-3 bg-white border rounded-2xl rounded-bl-none max-w-[80%]" style="border-color: #00CDB7;">' +
                            '<p class="text-sm">' + data + '</p>' +
                            '<div class="flex items-center justify-end space-x-1 mt-1 text-gray-400">' +
                            '<i class="fas fa-clock text-xs"></i>' +
                            '<span class="text-xs">' + currentTime + '</span>' +
                            '</div>' +
                            '<div class="absolute bottom-0 left-0 -translate-x-1/2 w-3 h-3 bg-white" style="clip-path: polygon(100% 0, 0 0, 100% 100%);"></div>' +
                            '</div>' +
                            '</div>' +
                            '</div>';
                        
                        $("#messageFormeight").append(botHtml);
                        $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
                    },
                    error: function() {
                        const errorHtml = '<div class="flex justify-start mb-4">' +
                            '<div class="flex items-end space-x-2">' +
                            '<div class="flex-shrink-0">' +
                            '<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="w-8 h-8 rounded-full object-cover">' +

                            '<p class="text-sm text-red-600">Désolé, une erreur de connexion est survenue.</p>' +
                            '<div class="flex items-center justify-end space-x-1 mt-1 text-gray-400">' +
                            '<i class="fas fa-clock text-xs"></i>' +
                            '<span class="text-xs">' + currentTime + '</span>' +
                            '</div>' +
                            '</div>' +
                            '</div>' +
                            '</div>';
                        
                        $("#messageFormeight").append(errorHtml);
                        $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
                    }
                });
            });

            // Gestionnaire pour la touche Entrée
            $("#text").keypress(function(e) {
                if (e.which == 13 && !e.shiftKey) {
                    e.preventDefault();
                    $("#messageArea").submit();
                }
            });
